<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Clock</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: var(--bg, #000); color: var(--fg, #f5f5f5); font-family: ui-sans-serif, system-ui, sans-serif; }
      body { display: grid; place-items: center; }
      .face { text-align: center; }
      .time { font-size: clamp(8rem, 22vw, 28rem); font-variant-numeric: tabular-nums; letter-spacing: -0.04em; line-height: 0.9; font-weight: 200; }
      .seconds { font-size: 0.4em; opacity: 0.6; margin-left: 0.2em; }
      .date { font-size: clamp(1.5rem, 3vw, 3rem); opacity: 0.8; margin-top: 1rem; letter-spacing: 0.02em; }
      .warn { position: fixed; top: 1rem; right: 1rem; font-size: 0.9rem; opacity: 0.8; background: rgba(255, 80, 80, 0.85); padding: 0.4rem 0.8rem; border-radius: 0.4rem; display: none; }
      .warn[data-show="true"] { display: block; }
    </style>
  </head>
  <body>
    <div class="face">
      <div class="time"><span id="hm">--:--</span><span id="sec" class="seconds"></span></div>
      <div id="date" class="date"></div>
    </div>
    <div id="warn" class="warn">Clock not synced</div>
    <script>
      const params = new URLSearchParams(location.search);
      let config = {};
      try { config = JSON.parse(params.get("config") || "{}"); } catch (e) {}
      if (config.color) document.body.style.setProperty("--fg", config.color);
      if (config.background) document.body.style.setProperty("--bg", config.background);

      const hm = document.getElementById("hm");
      const sec = document.getElementById("sec");
      const date = document.getElementById("date");
      const warn = document.getElementById("warn");

      function tick() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        hm.textContent = `${hours}:${minutes}`;
        if (config.show_seconds) {
          sec.textContent = ":" + String(now.getSeconds()).padStart(2, "0");
        }
        if (config.show_date !== false) {
          date.textContent = now.toLocaleDateString(undefined, {
            weekday: "long", month: "long", day: "numeric"
          });
        }
        if (now.getFullYear() < 2020) warn.dataset.show = "true";
      }
      tick();
      setInterval(tick, 1000);
      parent.postMessage({ type: "builtin_ready", id: "clock" }, "*");
    </script>
  </body>
</html>
