<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Transit</title>
    <link rel="stylesheet" href="/builtin/_shared/style.css" />
    <link rel="stylesheet" href="/builtin/transit/assets/transit.css" />
  </head>
  <body class="fixed inset-0 overflow-hidden bg-background text-foreground">
    <main
      id="root"
      class="transit-root flex h-full w-full flex-col gap-8 overflow-y-auto px-10 py-10"
      aria-live="polite"
    ></main>
    <script type="module">
      import { init, fetchWithTimeout } from "/builtin/_shared/runtime.js";

      const config = init("transit");
      const root = document.getElementById("root");

      const refreshSec = Math.max(15, config.refresh_sec ?? 60);
      const maxPerStop = Math.max(1, Math.min(12, config.max_per_stop ?? 4));
      const compact = config.compact_mode === true;
      const badgeStyle = config.line_badge_style ?? "filled";
      const soonThreshold = 5;

      applyStatusColors();

      function applyStatusColors() {
        if (config.on_time_color) {
          document.documentElement.style.setProperty("--transit-on-time", config.on_time_color);
        }
        if (config.late_color) {
          document.documentElement.style.setProperty("--transit-late", config.late_color);
        }
        if (config.cancelled_color) {
          document.documentElement.style.setProperty("--transit-cancelled", config.cancelled_color);
        }
      }

      function fmtWhen(date) {
        const diff = Math.round((date.getTime() - Date.now()) / 60000);
        if (diff <= 0) return "now";
        if (diff < 60) return diff + " min";
        return date.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
      }

      function resolveMinutes(dep) {
        if (typeof dep.minutes === "number") return dep.minutes;
        if (dep.when) {
          const when = new Date(dep.when);
          if (!Number.isNaN(when.getTime())) {
            return Math.round((when.getTime() - Date.now()) / 60000);
          }
        }
        return null;
      }

      function normalizeStatus(dep) {
        const raw = dep.status ?? (dep.cancelled ? "cancelled" : dep.late ? "late" : null);
        if (!raw) return "on_time";
        const s = String(raw).toLowerCase().replace(/[\s-]+/g, "_");
        if (s === "canceled" || s === "cancelled") return "cancelled";
        if (s === "late" || s === "delayed" || s === "delay") return "late";
        if (s === "on_time" || s === "scheduled" || s === "expected") return "on_time";
        return "on_time";
      }

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text != null) node.textContent = text;
        return node;
      }

      function render(data) {
        root.innerHTML = "";
        const stops = data.stops ?? [];

        if (stops.length === 0) {
          root.appendChild(el("p", "text-base italic text-muted-foreground", "No stops configured."));
          return;
        }

        const stopGap = compact ? "gap-4" : "gap-8";
        root.className =
          "transit-root flex h-full w-full flex-col overflow-y-auto px-10 py-10 " + stopGap;

        for (const stop of stops) {
          const section = el("section", "flex flex-col " + (compact ? "gap-2" : "gap-3"));
          const heading = el(
            "h2",
            compact
              ? "text-xl font-light tracking-tight text-foreground"
              : "text-3xl font-light tracking-tight text-foreground",
            stop.name ?? "Stop",
          );
          section.appendChild(heading);

          const departures = (stop.departures ?? []).slice(0, maxPerStop);
          if (departures.length === 0) {
            section.appendChild(
              el("p", "text-base italic text-muted-foreground", "No upcoming departures."),
            );
            root.appendChild(section);
            continue;
          }

          const list = el(
            "div",
            "divide-y divide-border/60 rounded-xl border border-border/60 bg-card/40 " +
              (compact ? "px-4 py-1" : "px-5 py-2"),
          );

          for (const dep of departures) {
            const when = dep.when ? new Date(dep.when) : null;
            const mins = resolveMinutes(dep);
            const status = normalizeStatus(dep);
            const imminent = mins != null && mins <= soonThreshold && status !== "cancelled";

            const row = el(
              "div",
              "dep-row flex items-baseline " + (compact ? "gap-4" : "gap-6"),
            );
            row.dataset.compact = compact ? "true" : "false";

            const badge = el("span", "line-badge shrink-0 text-lg", dep.line ?? "—");
            badge.dataset.style = badgeStyle;
            row.appendChild(badge);

            const dest = el(
              "span",
              "dep-dest min-w-0 flex-1 truncate " + (compact ? "text-base" : "text-lg"),
              dep.destination ?? "",
            );
            dest.dataset.status = status;
            row.appendChild(dest);

            let whenLabel;
            if (status === "cancelled") {
              whenLabel = "Cancelled";
            } else if (when && !Number.isNaN(when.getTime())) {
              whenLabel = fmtWhen(when);
            } else if (mins != null) {
              whenLabel = mins + " min";
            } else {
              whenLabel = "—";
            }

            const whenEl = el(
              "span",
              "dep-when shrink-0 tabular-nums whitespace-nowrap " + (compact ? "text-base" : "text-lg"),
              whenLabel,
            );
            whenEl.dataset.status = status;
            if (imminent) whenEl.dataset.imminent = "true";
            row.appendChild(whenEl);

            list.appendChild(row);
          }

          section.appendChild(list);
          root.appendChild(section);
        }
      }

      function showError(message) {
        root.innerHTML = "";
        const panel = el(
          "div",
          "flex flex-1 flex-col items-center justify-center gap-3 px-8 text-center",
        );
        panel.appendChild(el("p", "text-lg text-destructive", message));
        root.appendChild(panel);
      }

      async function load() {
        if (!config.feed_url) {
          showError("Configure feed_url.");
          return;
        }
        try {
          const res = await fetchWithTimeout(config.feed_url, {}, 15000);
          if (!res.ok) throw new Error("HTTP " + res.status);
          render(await res.json());
        } catch (err) {
          showError("Could not load: " + err);
        }
      }

      load();
      setInterval(load, refreshSec * 1000);
    </script>
  </body>
</html>
