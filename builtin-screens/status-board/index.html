<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Status board</title>
    <link rel="stylesheet" href="/builtin/_shared/style.css" />
    <link rel="stylesheet" href="/builtin/status-board/assets/status-board.css" />
  </head>
  <body class="bg-background text-foreground h-screen min-h-screen overflow-hidden">
    <div
      id="grid"
      class="status-board-root grid h-full w-full content-start transition-opacity duration-300"
      role="list"
    ></div>
    <script type="module">
      import { init, fetchWithTimeout } from "/builtin/_shared/runtime.js";

      const config = init("status-board");
      const grid = document.getElementById("grid");

      const DENSITY = {
        compact: {
          pad: "p-3",
          gap: "gap-2",
          gridGap: "gap-2",
          icon: "text-2xl",
          value: "text-3xl",
          unit: "text-sm",
          label: "text-xs",
          minH: "min-h-[12vh]",
        },
        comfortable: {
          pad: "p-5",
          gap: "gap-3",
          gridGap: "gap-4",
          icon: "text-3xl",
          value: "text-4xl",
          unit: "text-base",
          label: "text-sm",
          minH: "min-h-[16vh]",
        },
        spacious: {
          pad: "p-8",
          gap: "gap-4",
          gridGap: "gap-6",
          icon: "text-4xl",
          value: "text-5xl",
          unit: "text-lg",
          label: "text-base",
          minH: "min-h-[20vh]",
        },
      };

      const COLUMN_CLASS = {
        1: "grid-cols-1",
        2: "grid-cols-2",
        3: "grid-cols-3",
        4: "grid-cols-4",
        5: "grid-cols-5",
        6: "grid-cols-6",
      };

      const VALUE_COLOR = {
        auto: "text-foreground",
        primary: "text-primary",
        destructive: "text-destructive",
      };

      const ERROR_STYLE = {
        subtle: "text-destructive",
        border: "border border-destructive bg-destructive/10 text-destructive",
        prominent:
          "border-2 border-destructive bg-destructive/20 text-destructive ring-2 ring-destructive/30",
      };

      function density() {
        return DENSITY[config.layout_density] ?? DENSITY.comfortable;
      }

      function columns() {
        const n = Number(config.columns);
        if (!Number.isFinite(n)) return 3;
        return Math.max(1, Math.min(6, Math.round(n)));
      }

      function valueColorClass() {
        return VALUE_COLOR[config.value_color] ?? VALUE_COLOR.auto;
      }

      function errorClass() {
        return ERROR_STYLE[config.error_styling] ?? ERROR_STYLE.border;
      }

      function applyGridLayout() {
        const d = density();
        const cols = columns();
        grid.className = [
          "status-board-root grid h-full w-full content-start transition-opacity duration-300",
          "p-6",
          d.gridGap,
          COLUMN_CLASS[cols] ?? COLUMN_CLASS[3],
        ].join(" ");
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function tileAccentStyle(entity) {
        const color = entity.accent_color || config.accent_color;
        if (!color) return "";
        return `--tile-accent:${color}`;
      }

      function renderConfigError(message) {
        applyGridLayout();
        const d = density();
        grid.innerHTML = "";
        const tile = document.createElement("article");
        tile.className = [
          "col-span-full flex flex-col justify-center rounded-xl bg-card text-card-foreground",
          d.pad,
          d.gap,
          d.minH,
          errorClass(),
        ].join(" ");
        tile.setAttribute("role", "listitem");
        tile.innerHTML =
          `<div class="${d.icon} opacity-80" aria-hidden="true">⚠️</div>` +
          `<div class="${d.value} font-light leading-none tracking-tight tabular-nums">${escapeHtml(message)}</div>` +
          `<div class="${d.label} text-muted-foreground">Configuration</div>`;
        grid.appendChild(tile);
      }

      function renderTile(result) {
        const d = density();
        const entity = result.entity;
        const tile = document.createElement("article");
        const accentStyle = tileAccentStyle(entity);
        const hasAccent = Boolean(accentStyle);

        tile.className = [
          "flex flex-col rounded-xl bg-card text-card-foreground border border-border shadow-sm",
          d.pad,
          d.gap,
          d.minH,
          hasAccent ? "tile-accent" : "",
        ].join(" ");
        tile.setAttribute("role", "listitem");
        if (hasAccent) tile.style.cssText = accentStyle;

        if (result.error) {
          tile.className += " " + errorClass();
          tile.innerHTML =
            `<div class="${d.icon} opacity-80" aria-hidden="true">${escapeHtml(entity.icon || "⚠️")}</div>` +
            `<div class="${d.value} font-light leading-none tracking-tight tabular-nums break-words">${escapeHtml(result.error)}</div>` +
            `<div class="${d.label} text-muted-foreground">${escapeHtml(entity.label || entity.id)}</div>`;
          return tile;
        }

        const unit = entity.unit || result.state.attributes?.unit_of_measurement || "";
        const label =
          entity.label || result.state.attributes?.friendly_name || entity.id;
        const valueClass = `${d.value} font-light leading-none tracking-tight tabular-nums ${valueColorClass()}`;

        tile.innerHTML =
          `<div class="${d.icon} opacity-80" aria-hidden="true">${escapeHtml(entity.icon || "•")}</div>` +
          `<div class="${valueClass}">` +
          `${escapeHtml(result.state.state)}` +
          (unit
            ? `<span class="${d.unit} ml-1 font-normal text-muted-foreground">${escapeHtml(unit)}</span>`
            : "") +
          `</div>` +
          `<div class="${d.label} text-muted-foreground">${escapeHtml(label)}</div>`;

        return tile;
      }

      async function refresh() {
        applyGridLayout();

        if (!config.ha_base_url || !config.ha_token || !Array.isArray(config.entities)) {
          renderConfigError("Configure ha_base_url, ha_token and entities.");
          return;
        }

        if (config.entities.length === 0) {
          renderConfigError("Add at least one entity to the entities list.");
          return;
        }

        grid.style.opacity = "0.65";
        const headers = {
          Authorization: "Bearer " + config.ha_token,
          "Content-Type": "application/json",
        };

        const results = await Promise.all(
          config.entities.map(async (entity) => {
            try {
              const url =
                config.ha_base_url.replace(/\/$/, "") +
                "/api/states/" +
                encodeURIComponent(entity.id);
              const r = await fetchWithTimeout(url, { headers });
              if (!r.ok) return { entity, error: "HTTP " + r.status };
              return { entity, state: await r.json() };
            } catch (err) {
              return { entity, error: String(err) };
            }
          }),
        );

        grid.innerHTML = "";
        for (const result of results) {
          grid.appendChild(renderTile(result));
        }
        grid.style.opacity = "1";
      }

      refresh();
      setInterval(refresh, 30000);
    </script>
  </body>
</html>
