<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Calendar</title>
    <link rel="stylesheet" href="/builtin/_shared/style.css" />
  </head>
  <body class="bg-background text-foreground">
    <div id="root" class="grid h-screen w-screen grid-rows-[auto_1fr] gap-4 px-8 py-6 overflow-hidden" data-layout="agenda" data-density="comfortable">
      <header class="shrink-0 border-b border-border/60 pb-4">
        <h1 id="title" class="text-4xl font-light tracking-tight">Upcoming</h1>
      </header>
      <div id="body" class="min-h-0 overflow-y-auto text-muted-foreground italic text-base">Loading…</div>
    </div>
    <script type="module">
      import { init } from "/builtin/_shared/runtime.js";
      import { mountCalendar } from "./assets/app.js";
      const config = init("calendar");
      mountCalendar(document.getElementById("root"), config);
    </script>
  </body>
</html>
