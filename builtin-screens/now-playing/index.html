<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Now playing</title>
    <link rel="stylesheet" href="/builtin/_shared/style.css" />
    <link rel="stylesheet" href="/builtin/now-playing/assets/now-playing.css" />
  </head>
  <body class="screen-root bg-background text-foreground">
    <div id="bg" class="np-bg hidden" aria-hidden="true"></div>
    <div id="panel" class="np-panel hidden">
      <div class="np-art-wrap shrink-0">
        <div id="art" class="np-art" role="img" aria-label="Album art"></div>
      </div>
      <div class="np-info min-w-0">
        <h1 id="title" class="text-title-xl font-light tracking-tight text-balance"></h1>
        <p id="artist" class="text-title-md text-muted-foreground mt-3"></p>
        <p id="album" class="text-title-sm text-muted-foreground opacity-70 mt-1"></p>
        <div id="progress" class="np-progress"><div></div></div>
      </div>
    </div>
    <div id="empty" class="np-empty text-title-sm text-muted-foreground">Nothing is playing.</div>
    <script type="module">
      import { init } from "/builtin/_shared/runtime.js";
      import { startNowPlaying } from "./assets/now-playing.js";
      const config = init("now-playing");
      startNowPlaying(config, {
        bg: document.getElementById("bg"),
        panel: document.getElementById("panel"),
        art: document.getElementById("art"),
        title: document.getElementById("title"),
        artist: document.getElementById("artist"),
        album: document.getElementById("album"),
        progress: document.getElementById("progress"),
        empty: document.getElementById("empty"),
      });
    </script>
  </body>
</html>
