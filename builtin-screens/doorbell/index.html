<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Doorbell</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #000; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
      .frame { position: fixed; inset: 0; }
      img.cam { width: 100%; height: 100%; object-fit: contain; background: #000; }
      .banner {
        position: fixed; top: 0; left: 0; right: 0;
        background: rgba(255, 60, 60, 0.85);
        color: #fff; text-align: center;
        font-size: clamp(1.5rem, 3vw, 3rem);
        padding: 1rem; letter-spacing: 0.05em; text-transform: uppercase;
        animation: pulse 1.5s ease-in-out infinite alternate;
      }
      @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
      .err { position: fixed; inset: 0; display: grid; place-items: center; color: #ff9b9b; font-size: 1.5rem; }
    </style>
  </head>
  <body>
    <div class="banner" id="label">Doorbell</div>
    <div class="frame">
      <img class="cam" id="cam" alt="" />
    </div>
    <div class="err" id="err" style="display:none"></div>
    <script>
      const params = new URLSearchParams(location.search);
      let config = {};
      try { config = JSON.parse(params.get("config") || "{}"); } catch (e) {}
      document.getElementById("label").textContent = config.label || "Doorbell";
      const cam = document.getElementById("cam");
      const err = document.getElementById("err");

      if (!config.snapshot_url) {
        err.textContent = "Configure snapshot_url";
        err.style.display = "grid";
      } else if (config.is_stream) {
        cam.src = config.snapshot_url;
      } else {
        function pull() {
          const sep = config.snapshot_url.includes("?") ? "&" : "?";
          cam.src = config.snapshot_url + sep + "_t=" + Date.now();
        }
        pull();
        setInterval(pull, config.refresh_ms || 1000);
      }

      parent.postMessage({ type: "builtin_ready", id: "doorbell" }, "*");
    </script>
  </body>
</html>
