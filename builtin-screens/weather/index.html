<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather</title>
    <link rel="stylesheet" href="/builtin/_shared/style.css" />
  </head>
  <body class="screen-root">
    <main
      class="flex flex-col justify-between w-full h-full max-w-7xl mx-auto p-8 gap-8 min-h-0"
    >
      <section class="flex flex-row items-center gap-8 flex-1 min-h-0">
        <div
          id="icon"
          class="shrink-0 flex items-center justify-center text-primary w-[clamp(5rem,calc(18vw*var(--font-scale,1)),14rem)] h-[clamp(5rem,calc(18vw*var(--font-scale,1)),14rem)] text-[clamp(5rem,calc(18vw*var(--font-scale,1)),14rem)] leading-none"
          aria-hidden="true"
        >
          …
        </div>
        <div class="flex flex-col gap-2 min-w-0">
          <div class="text-display-lg tabular text-foreground">
            <span id="temp">--</span><span id="unit" class="text-primary opacity-80">°</span>
          </div>
          <div id="label" class="text-title-sm text-muted-foreground truncate"></div>
          <div id="summary" class="text-body text-muted-foreground"></div>
        </div>
      </section>

      <section
        id="forecast"
        class="grid gap-3 w-full shrink-0"
        style="grid-template-columns: repeat(var(--forecast-cols, 5), minmax(0, 1fr))"
      ></section>
    </main>

    <script type="module">
      import { init, fetchWithTimeout } from "/builtin/_shared/runtime.js";
      import { setWeatherIcon, SUMMARY } from "./assets/icons.js";

      const config = init("weather");

      const iconStyle = config.icon_style ?? "line";
      const forecastDays = Math.max(1, Math.min(7, config.forecast_days ?? 5));
      document.documentElement.style.setProperty("--forecast-cols", String(forecastDays));

      const iconEl = document.getElementById("icon");
      const tempEl = document.getElementById("temp");
      const unitEl = document.getElementById("unit");
      const labelEl = document.getElementById("label");
      const summaryEl = document.getElementById("summary");
      const forecastEl = document.getElementById("forecast");

      function showError(message) {
        summaryEl.innerHTML =
          '<span class="text-destructive">' + message.replace(/</g, "&lt;") + "</span>";
      }

      function locationLabel() {
        if (config.location_label) return config.location_label;
        if (config.latitude != null && config.longitude != null) {
          return config.latitude.toFixed(2) + ", " + config.longitude.toFixed(2);
        }
        return "";
      }

      function render(data) {
        const code = data.current.weather_code;
        setWeatherIcon(iconEl, code, iconStyle, "w-full h-full");
        tempEl.textContent = String(Math.round(data.current.temperature_2m));
        unitEl.textContent = data.current_units.temperature_2m;
        labelEl.textContent = locationLabel();
        summaryEl.textContent = SUMMARY[code] ?? "";

        const apparent = data.current.apparent_temperature;
        if (
          typeof apparent === "number" &&
          Math.abs(Math.round(apparent) - Math.round(data.current.temperature_2m)) >= 2
        ) {
          summaryEl.textContent +=
            " · Feels like " +
            Math.round(apparent) +
            data.current_units.temperature_2m;
        }

        forecastEl.replaceChildren();
        const days = Math.min(data.daily.time.length, forecastDays);
        for (let i = 0; i < days; i++) {
          const dayCode = data.daily.weather_code[i];
          const card = document.createElement("article");
          card.className =
            "flex flex-col items-center gap-2 rounded-xl border border-border bg-card/60 px-3 py-4 text-center";
          const name = document.createElement("div");
          name.className = "text-caption uppercase tracking-wide";
          const d = new Date(data.daily.time[i]);
          name.textContent = d.toLocaleDateString(undefined, { weekday: "short" });
          const ic = document.createElement("div");
          ic.className =
            "flex items-center justify-center text-primary w-[clamp(2rem,calc(4vw*var(--font-scale,1)),3.5rem)] h-[clamp(2rem,calc(4vw*var(--font-scale,1)),3.5rem)]" +
            (iconStyle === "emoji" ? " text-[clamp(2rem,calc(4vw*var(--font-scale,1)),3.5rem)] leading-none" : "");
          setWeatherIcon(ic, dayCode, iconStyle, "w-full h-full");
          const hi = document.createElement("div");
          hi.className = "text-title-sm tabular text-foreground";
          hi.textContent = Math.round(data.daily.temperature_2m_max[i]) + "°";
          const lo = document.createElement("div");
          lo.className = "text-caption tabular";
          lo.textContent = Math.round(data.daily.temperature_2m_min[i]) + "°";
          card.append(name, ic, hi, lo);
          forecastEl.appendChild(card);
        }
      }

      async function load() {
        if (config.latitude == null || config.longitude == null) {
          showError("Configure latitude and longitude.");
          return;
        }

        const units = config.units || "metric";
        const tempUnit = units === "imperial" ? "fahrenheit" : "celsius";
        const url = new URL("https://api.open-meteo.com/v1/forecast");
        url.searchParams.set("latitude", String(config.latitude));
        url.searchParams.set("longitude", String(config.longitude));
        url.searchParams.set("current", "temperature_2m,weather_code,apparent_temperature");
        url.searchParams.set("daily", "weather_code,temperature_2m_max,temperature_2m_min");
        url.searchParams.set("forecast_days", String(forecastDays));
        url.searchParams.set("temperature_unit", tempUnit);
        url.searchParams.set("timezone", "auto");

        try {
          const res = await fetchWithTimeout(url, {}, 15000);
          if (!res.ok) throw new Error("HTTP " + res.status);
          render(await res.json());
        } catch (err) {
          showError("Could not load weather: " + err);
        }
      }

      load();
      setInterval(load, 15 * 60 * 1000);
    </script>
  </body>
</html>
