<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Photos</title>
    <link rel="stylesheet" href="/builtin/_shared/style.css" />
    <link rel="stylesheet" href="/builtin/photos/assets/photos.css" />
  </head>
  <body class="fixed inset-0 overflow-hidden bg-background text-foreground">
    <div id="frame" class="fixed inset-0 isolate bg-background">
      <div id="layer-a" class="slide-layer"></div>
      <div id="layer-b" class="slide-layer"></div>
    </div>
    <div
      id="caption"
      class="pointer-events-none fixed inset-x-0 z-20 hidden px-8 py-6 text-center text-title-sm text-foreground"
      aria-live="polite"
    ></div>
    <div
      id="err"
      class="fixed inset-0 z-50 hidden place-items-center p-8 text-center text-title-sm text-destructive"
      role="alert"
    ></div>
    <script type="module">
      import { init } from "/builtin/_shared/runtime.js";

      const config = init("photos");
      const layerA = document.getElementById("layer-a");
      const layerB = document.getElementById("layer-b");
      const captionEl = document.getElementById("caption");
      const errEl = document.getElementById("err");
      const frame = document.getElementById("frame");

      const intervalMs = Math.max(5, config.interval_sec ?? 30) * 1000;
      const fadeMs = Math.max(200, Math.min(5000, config.fade_duration_ms ?? 1500));
      const kbSec = Math.max(5, Math.min(120, config.kenburns_duration ?? 30));

      document.documentElement.style.setProperty("--fade-duration", fadeMs + "ms");
      document.documentElement.style.setProperty("--kb-duration", kbSec + "s");

      const transitionStyle = resolveTransitionStyle(config);
      const captionPosition = config.caption_position ?? "none";
      const instant = config.transition === "none" && !config.transition_style;

      frame.classList.add("slide-" + transitionStyle);
      applyCaptionLayout(captionPosition);

      function resolveTransitionStyle(cfg) {
        if (cfg.transition_style) return cfg.transition_style;
        const legacy = cfg.transition ?? "kenburns";
        if (legacy === "none") return "fade";
        return legacy;
      }

      function applyCaptionLayout(pos) {
        captionEl.classList.remove(
          "bottom-0", "bg-gradient-to-t", "from-background/90", "to-transparent",
          "backdrop-blur-sm", "bg-background/40", "bottom-8", "rounded-xl",
          "mx-auto", "max-w-4xl", "left-8", "right-8", "text-muted-foreground"
        );
        if (pos === "none") { captionEl.classList.add("hidden"); return; }
        captionEl.classList.remove("hidden");
        if (pos === "bottom") {
          captionEl.classList.add("bottom-0", "bg-gradient-to-t", "from-background/90", "to-transparent", "text-muted-foreground");
        } else if (pos === "overlay") {
          captionEl.classList.add("bottom-8", "left-8", "right-8", "mx-auto", "max-w-4xl", "rounded-xl", "backdrop-blur-sm", "bg-background/40", "text-foreground");
        }
      }

      function showError(msg) {
        errEl.textContent = String(msg);
        errEl.classList.remove("hidden");
        errEl.classList.add("grid");
      }

      function setCaption(text) {
        if (captionPosition === "none" || !text) {
          captionEl.textContent = "";
          captionEl.classList.add("hidden");
          return;
        }
        captionEl.textContent = text;
        captionEl.classList.remove("hidden");
      }

      async function loadList() {
        if (config.library === "immich") {
          if (!config.immich_base_url || !config.immich_api_key) {
            throw new Error("Configure immich_base_url and immich_api_key");
          }
          const headers = { "x-api-key": config.immich_api_key };
          if (config.immich_album_id) {
            const r = await fetch(config.immich_base_url + "/api/album/" + config.immich_album_id, { headers });
            if (!r.ok) throw new Error("Immich album HTTP " + r.status);
            const album = await r.json();
            return album.assets.map((a) => ({
              src: config.immich_base_url + "/api/asset/file/" + a.id + "?isThumb=false",
              caption: photoCaption(a), api: true,
            }));
          }
          const r = await fetch(config.immich_base_url + "/api/asset?type=IMAGE", { headers });
          if (!r.ok) throw new Error("Immich asset HTTP " + r.status);
          const list = await r.json();
          return list.slice(0, 200).map((a) => ({
            src: config.immich_base_url + "/api/asset/file/" + a.id + "?isThumb=false",
            caption: photoCaption(a), api: true,
          }));
        }
        if (config.library === "local") {
          if (!config.local_index_url) throw new Error("Configure local_index_url");
          const r = await fetch(config.local_index_url);
          if (!r.ok) throw new Error("Local HTTP " + r.status);
          const list = await r.json();
          return list.map((src) => ({ src, caption: localCaption(src), api: false }));
        }
        if (config.library === "google") {
          throw new Error("Google Photos backend is best-effort; switch to Immich (see SPEC §11).");
        }
        throw new Error("Unknown library: " + config.library);
      }

      function photoCaption(asset) {
        const exif = asset.exifInfo;
        if (exif?.description) return exif.description;
        if (exif?.city && exif?.country) return exif.city + ", " + exif.country;
        if (asset.originalFileName) return asset.originalFileName;
        return "";
      }

      function localCaption(url) {
        try {
          const name = decodeURIComponent(url.split("/").pop() || "");
          return name.replace(/\.[^.]+$/, "").replace(/[-_]/g, " ");
        } catch { return ""; }
      }

      async function fetchImage(item) {
        if (!item.api) return item.src;
        const headers = { "x-api-key": config.immich_api_key };
        const r = await fetch(item.src, { headers });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const blob = await r.blob();
        return URL.createObjectURL(blob);
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function revokeBlob(url) {
        if (url && url.startsWith("blob:")) URL.revokeObjectURL(url);
      }

      async function run() {
        let list;
        try { list = await loadList(); } catch (e) { showError(e); return; }
        if (!list.length) { showError("No photos in library."); return; }
        shuffle(list);

        let index = 0;
        let activeLayer = layerA;
        let idleLayer = layerB;
        let activeImg = null;

        async function showNext() {
          const item = list[index % list.length];
          index++;
          let src;
          try { src = await fetchImage(item); } catch (e) {
            console.error("photo fetch failed", e);
            setTimeout(showNext, 2000);
            return;
          }
          const img = document.createElement("img");
          img.alt = item.caption || "Photo";
          img.decoding = "async";
          const targetLayer = transitionStyle === "crossfade" || transitionStyle === "push" ? idleLayer : activeLayer;
          try {
            await new Promise((resolve, reject) => {
              img.onload = () => resolve();
              img.onerror = () => reject(new Error("load failed"));
              img.src = src;
            });
          } catch {
            console.error("photo load failed", item.src);
            revokeBlob(src);
            setTimeout(showNext, 1000);
            return;
          }
          if (transitionStyle === "crossfade" || transitionStyle === "push") {
            targetLayer.innerHTML = "";
            targetLayer.appendChild(img);
            if (activeImg) { activeImg.classList.remove("is-visible"); activeImg.classList.add("is-exiting"); }
            requestAnimationFrame(() => { img.classList.add("is-visible"); setCaption(item.caption); });
            const prevImg = activeImg;
            const prevSrc = prevImg?.src;
            setTimeout(() => {
              if (prevImg) { prevImg.remove(); revokeBlob(prevSrc); }
              [activeLayer, idleLayer] = [idleLayer, activeLayer];
            }, instant ? 0 : fadeMs);
            activeImg = img;
          } else {
            const prev = activeImg;
            const prevSrc = prev?.src;
            activeLayer.appendChild(img);
            requestAnimationFrame(() => {
              img.classList.add("is-visible");
              if (prev) prev.classList.remove("is-visible");
              setCaption(item.caption);
            });
            if (prev) {
              setTimeout(() => { prev.remove(); revokeBlob(prevSrc); }, instant ? 0 : fadeMs);
            }
            activeImg = img;
          }
          setTimeout(showNext, intervalMs);
        }
        showNext();
      }
      run();
    </script>
  </body>
</html>
