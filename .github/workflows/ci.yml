name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck --if-present --workspaces
      - name: Build
        run: npm run build --if-present --workspaces
      - name: Test
        run: npm test --if-present --workspaces

  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck install.sh
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: deploy
